name: nginx_access_combined
log_type: nginx_access
type: regex
priority: 5
enabled: true
pattern: '(?P<src_ip>\S+)\s+-\s+(?P<user>\S+)\s+\[.*?\]\s+"(?P<method>\S+)\s+(?P<request>[^"]+?)\s+HTTP/[^"]+"\s+(?P<status>\d+)\s+(?P<bytes>\d+)\s+"(?P<referer>[^"]*)"\s+"(?P<ua>[^"]*)"'
fields:
  event.category: web
  event.action: http_request
  source.ip: src_ip
  http.request.method: method
  url.path: request
  http.response.status_code: status
  http.response.bytes: bytes
  url.referrer: referer
  user_agent.original: ua
