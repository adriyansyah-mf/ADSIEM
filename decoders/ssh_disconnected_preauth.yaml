name: ssh_disconnected_preauth
log_type: linux_auth
type: regex
priority: 20
enabled: true
pattern: 'Disconnected from (?:authenticating user|invalid user) (?P<user>\S+) (?P<src_ip>\S+) port (?P<port>\d+)'
fields:
  event.category: authentication
  event.action: login_failed
  source.ip: src_ip
  user.name: user
  source.port: port
