use_default_settings: true

general:
  debug: false
  instance_name: "SIEM Threat Intel"

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "en"
  formats:
      - html
      - json


server:
  port: 8080
  bind_address: "0.0.0.0"
  secret_key: "${SEARXNG_SECRET}"
  public_instance: false

ui:
  static_use_hash: true

outgoing:
  request_timeout: 10.0
  useragent_suffix: "SIEM-ThreatIntel/1.0"

engines:
  - name: google
    engine: google
    shortcut: g
    use_mobile_ui: false
  - name: bing
    engine: bing
    shortcut: b
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
