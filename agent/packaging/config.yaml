agent:
  id: ""
  name: ""        # set to hostname if blank at runtime
  group: default
  token: ""       # populated automatically after enrollment
  buffer_size: 10000

server:
  url: http://your-siem-server:8000
  heartbeat_interval: 30

logs:
  - path: /var/log/auth.log
    type: linux_auth
  - path: /var/log/syslog
    type: syslog
