title: Credentials or Secrets Exposed in URL
id: rule-credentials-in-url
description: URL query string contains plaintext passwords, API keys, or tokens — cryptographic failure (A02)
logsource:
  product: webserver
detection:
  secret_params:
    url.path|re: '[?&](?:password|passwd|pwd|secret|api_key|apikey|api_token|access_token|auth_token|private_key|client_secret)=[^&]{3,}'
  bearer_in_url:
    url.path|re: '[?&](?:token|jwt|bearer)=[A-Za-z0-9_\-\.]{20,}'
  condition: secret_params or bearer_in_url
suppression:
  timewindow: 300
level: medium
tags:
  - attack.credential_access
  - attack.t1552.001
  - owasp.a02
