title: Windows Logon Brute Force
id: rule-windows-brute-force
description: Multiple failed Windows logon attempts from the same source IP (EventID 4625)
logsource:
  product: windows
  service: security
detection:
  selection:
    event.action: login_failed
    event.category: authentication
  condition: selection
threshold:
  count: 5
  timewindow: 120
  group_by: source.ip
suppression:
  timewindow: 1800
level: high
tags:
  - attack.credential_access
  - attack.t1110.001
