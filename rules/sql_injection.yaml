title: SQL Injection Attempt
id: rule-sql-injection
description: HTTP request URL contains SQL injection keywords
logsource:
  product: webserver
detection:
  union_select_url:
    url.path|re: '(?i)(?:union[\s\+]+(?:all[\s\+]+)?select|select[\s\+]+.+[\s\+]+from|insert[\s\+]+into|drop[\s\+]+table|exec(?:ute)?[\s\+]*\()'
  union_select_ref:
    url.referrer|re: '(?i)(?:union[\s\+]+(?:all[\s\+]+)?select|select[\s\+]+.+[\s\+]+from|insert[\s\+]+into|drop[\s\+]+table|exec(?:ute)?[\s\+]*\()'
  error_based_url:
    url.path|contains:
      - "sleep("
      - "benchmark("
      - "extractvalue("
      - "updatexml("
      - "1=1--"
      - "'or'"
      - "' or '"
  error_based_ref:
    url.referrer|contains:
      - "sleep("
      - "benchmark("
      - "extractvalue("
      - "updatexml("
      - "1=1--"
      - "'or'"
      - "' or '"
  condition: union_select_url or union_select_ref or error_based_url or error_based_ref
suppression:
  timewindow: 300
level: high
tags:
  - attack.initial_access
  - attack.t1190
