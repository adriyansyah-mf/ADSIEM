title: SSH Root Brute Force
id: rule-ssh-root-brute-force
description: Multiple failed SSH login attempts targeting the root account
logsource:
  product: linux
detection:
  selection:
    event.action: login_failed
    user.name: root
  condition: selection
threshold:
  count: 3
  timewindow: 120
  group_by: source.ip
suppression:
  timewindow: 3600
level: critical
tags:
  - attack.credential_access
  - attack.t1110.001
