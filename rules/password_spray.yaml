title: Password Spray Attack
id: rule-password-spray
description: Many failed login attempts targeting different usernames from same IP — indicates password spraying
logsource:
  product: linux
detection:
  selection:
    event.action: login_failed
  condition: selection
threshold:
  count: 10
  timewindow: 300
  group_by: source.ip
suppression:
  timewindow: 3600
level: high
tags:
  - attack.credential_access
  - attack.t1110.003
