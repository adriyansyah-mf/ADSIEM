title: Default Credential Login Attempt
id: rule-default-credentials
description: Login attempt with well-known default username — default cred stuffing against web apps or devices (A07)
logsource:
  product: webserver
detection:
  default_users:
    url.path|re: '(?i)[?&](?:user(?:name)?|login|email|uid)=(?:admin|administrator|root|test|guest|user|support|operator|manager|superuser|sysadmin|webmaster|demo|default)'
  default_path:
    url.path|re: '(?i)(?:/login|/signin|/auth)[^/]*[?&]'
    url.path|re: '(?i)(?:user(?:name)?|login)=(?:admin|root|test|guest)'
  condition: default_users
threshold:
  count: 3
  timewindow: 120
  group_by: source.ip
suppression:
  timewindow: 3600
level: medium
tags:
  - attack.credential_access
  - attack.t1110.001
  - owasp.a07
