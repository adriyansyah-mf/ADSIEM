title: SSH Login via Password Authentication
id: rule-ssh-password-auth
description: Successful SSH login using password instead of public key — environments should enforce key-based auth only
logsource:
  product: linux
detection:
  selection:
    event.action: login_success
    auth.method: password
  condition: selection
suppression:
  timewindow: 3600
level: medium
tags:
  - attack.initial_access
  - attack.t1078
